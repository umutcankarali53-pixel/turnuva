{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Yonetim{% endblock %} | {{ site.site_adi }}</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="{% static 'css/admin.css' %}" rel="stylesheet">
</head>
<body class="admin-body">
    {% include 'admin/partials/sidebar.html' %}
    <div class="admin-main">
        <header class="admin-topbar">
            <button class="btn btn-link sidebar-toggle d-lg-none" type="button" onclick="document.getElementById('adminSidebar').classList.toggle('open')"><i class="bi bi-list fs-4"></i></button>
            <div class="topbar-title">{% block page_title %}Dashboard{% endblock %}</div>
            <div class="topbar-user"><i class="bi bi-person-badge me-1"></i>{{ user.username }}</div>
        </header>
        <div class="admin-content">{% include 'includes/messages.html' %}{% block content %}{% endblock %}</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
