services:
  - type: web
    name: turnuva-kayit
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn turnuva_projesi.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
