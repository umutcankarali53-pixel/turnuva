{% extends 'turnuva/base.html' %}
{% load socialaccount %}

{% block content %}
<style>
    .kullanici-formu input {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1px solid #ced4da;
        border-radius: 8px;
        margin-top: 0.4rem;
        margin-bottom: 1rem;
        color: #212529;
        transition: all 0.2s;
    }
    .kullanici-formu input:focus {
        border-color: #28a745; /* Kayıt ol yeşil temalı olduğu için odaklanma rengini yeşil yaptık */
        outline: none;
        box-shadow: 0 0 0 0.25rem rgba(40, 167, 69, 0.25);
    }
    .kullanici-formu label {
        font-weight: 600;
        color: #1e3c72;
    }
    /* Django'nun şifre kuralları metinlerini kibar, küçük ve okunabilir yapar */
    .helptext {
        display: block;
        font-size: 0.75rem;
        color: #6c757d;
        margin-top: -0.8rem;
        margin-bottom: 1rem;
        line-height: 1.3;
    }
    /* Şifre uyuşmazlığı gibi hataları şık ve kırmızı gösterir */
    .errorlist {
        color: #dc3545;
        font-weight: 600;
        font-size: 0.85rem;
        list-style: none;
        padding-left: 0;
        margin-bottom: 1rem;
    }
</style>

<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-5"> <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <h3 class="card-title text-center mb-4 fw-bold" style="color: #1e3c72;">Sisteme Kayıt Ol</h3>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="kullanici-formu">
                        {{ form.as_p }}
                    </div>
                    <button type="submit" class="btn btn-success w-100 mt-2 py-2 fw-bold shadow-sm">
                        Kayıt Ol
                    </button>
                </form>

                <div class="d-flex align-items-center my-4">
                    <hr class="flex-grow-1 text-muted">
                    <span class="mx-3 text-muted small fw-bold">VEYA</span>
                    <hr class="flex-grow-1 text-muted">
                </div>

                <div class="d-grid gap-2">
                    <a href="{% provider_login_url 'google' %}" class="btn btn-outline-danger py-2 fw-bold d-flex align-items-center justify-content-center shadow-sm" style="border-radius: 8px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-google me-2" viewBox="0 0 16 16">
                          <path d="M15.545 6.558a9.42 9.42 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.689 7.689 0 0 1 5.352 2.082l-2.284 2.284A4.347 4.347 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.792 4.792 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.702 3.702 0 0 0 1.599-2.431H8v-3.08h7.545z"/>
                        </svg>
                        Google ile Hızlı Kayıt Ol
                    </a>
                </div>

                <div class="text-center mt-4 pt-2">
                    <p class="mb-0 text-muted">
                        Zaten hesabın var mı? <a href="{% url 'giris_yap' %}" class="text-decoration-none fw-bold" style="color: #1e3c72;">Giriş Yap</a>
                    </p>
                </div>
                
            </div>
        </div>
    </div>
</div>
{% endblock %}
